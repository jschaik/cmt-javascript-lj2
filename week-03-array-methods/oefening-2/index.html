<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oefening 2 — Namenlijst doorzoeken</title>
</head>
<body>
  <main>
    <section>
      <h2>Zoek op beginletter (find + startsWith)</h2>
      <label for="zoek-find">Beginletter:</label>
      <input type="text" id="zoek-find" placeholder="Typ een letter...">
      <output id="output-find"></output>
    </section>
    <section>
      <h2>Staat naam in de lijst? (includes + toLowerCase)</h2>
      <label for="zoek-includes">Naam:</label>
      <input type="text" id="zoek-includes" placeholder="Typ een naam...">
      <output id="output-includes"></output>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
