<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oefening 2 — Speler aanmaken via formulier</title>
</head>
<body>
  <main>
    <h1>Speler toevoegen</h1>
    <form id="player-form">
      <input type="text" id="name" placeholder="Naam">
      <input type="number" id="score" placeholder="Score">
      <button type="submit">Voeg toe</button>
    </form>
    <ul id="players"></ul>
  </main>
  <script src="script.js"></script>
</body>
</html>
