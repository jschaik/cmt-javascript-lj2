<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scorebord</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Scorebord</h1>
  </header>
  <main>
    <form id="speler-formulier">
      <input type="text" id="naam" placeholder="Naam">
      <input type="number" id="score" placeholder="Score">
      <input type="number" id="level" placeholder="Level" min="1">
      <button type="submit">Voeg toe</button>
    </form>
    <nav>
      <button id="filter-alle">Alle spelers</button>
      <button id="filter-level2">Level 2+</button>
      <input type="text" id="zoekbalk" placeholder="Zoek op naam...">
    </nav>
    <ol id="scorebord"></ol>
  </main>
  <script src="script.js"></script>
</body>
</html>
