<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scorebord</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Scorebord</h1>
  </header>
  <main>
    <form id="player-form">
      <input type="text" id="name" placeholder="Naam">
      <input type="number" id="score" placeholder="Score">
      <input type="number" id="level" placeholder="Level" min="1">
      <button type="submit">Voeg toe</button>
    </form>
    <nav>
      <button id="filter-all">Alle spelers</button>
      <button id="filter-level3">Level 3+</button>
      <input type="text" id="search-bar" placeholder="Zoek op naam...">
    </nav>
    <ol id="scoreboard"></ol>
  </main>
  <script src="script.js"></script>
</body>
</html>
